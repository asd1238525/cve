swagger: '2.0'
info:
  title: "内部用户中心API文档（安全测试验证）"
  version: "1.0.0"
  description: "此文档由安全测试人员通过外部配置文件加载生成，仅用于验证configUrl漏洞。"
paths:
  /user/login:
    post:
      summary: "用户登录接口（测试用）"
      parameters:
        - name: username
          in: query
          type: string
          required: true
        - name: password
          in: query
          type: string
          required: true
      responses:
        '200':
          description: "登录成功"
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 200
              token:
                type: string
                example: "admin_token_123"
